<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Buddy — Track your money</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="index.html">💰 Budget Buddy</a>
  <nav>
    <a href="index.html" class="active">Tracker</a>
    <a href="report.html">Report</a>
    <a href="about.html">About</a>
  </nav>
</header>
<main class="wrap">
  <section class="summary">
    <div class="scard bal"><small>Balance</small><b id="balance">$0.00</b></div>
    <div class="scard inc"><small>Income</small><b id="income">$0.00</b></div>
    <div class="scard exp"><small>Expenses</small><b id="expense">$0.00</b></div>
  </section>

  <section class="card">
    <h2>Add transaction</h2>
    <form id="form" class="form">
      <div class="seg" id="type"><button type="button" class="on" data-v="expense">Expense</button><button type="button" data-v="income">Income</button></div>
      <input id="desc" placeholder="Description" required>
      <div class="row2">
        <div class="ip"><span>$</span><input id="amount" type="number" step="0.01" min="0" placeholder="0.00" required></div>
        <select id="cat"></select>
      </div>
      <button class="btn" type="submit">Add</button>
    </form>
  </section>

  <section class="card">
    <h2>History</h2>
    <ul id="list" class="tx-list"></ul>
  </section>
</main>
<footer class="foot">Budget Buddy · private, in your browser · SKRIZIdev</footer>
<script src="js/budget.js"></script>
<script src="js/tracker.js"></script>
</body>
</html>
